<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />

  <body>
    <div class="page-shell" id="top">
      <aside class="sidebar" aria-label="Portfolio navigation">

          <div class="nav-group">

        <section id="about" class="contact-strip" aria-label="About">
          <p class="kicker">ABOUT</p>
          <a href="#top">Back to index</a>
