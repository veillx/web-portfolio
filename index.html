<!doctype html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stavros Vailakis analogue street photography portfolio and visual archive."
    />
    <title>Stavros Vailakis | Analogue Street Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=102" />
  </head>
  <body class="has-welcome federico-home">
    <div class="federico-page" id="top">
      <header class="federico-header">
        <a class="federico-brand" href="#top" aria-label="Stavros Vailakis home">
          STAVROS<br />VAILAKIS
        </a>

        <div class="location-bar" aria-label="Current location and local time">
          <span>location: Heraklion, Crete</span>
          <time id="localTime" datetime=""></time>
        </div>

        <nav class="federico-nav" aria-label="Portfolio navigation">
          <a href="./index.html">portfolio</a>
          <a href="./archive.html">archive</a>
          <a class="strike-link" href="./commercial.html">commercial</a>
          <a href="./about.html">about/contact</a>
        </nav>
      </header>

      <main class="federico-main home-content">
        <section id="portfolio" class="project-index" aria-label="Photography portfolio">
          <p class="home-note">
            a personal space for expression, observation, and street photography.
          </p>

          <article class="project-entry project-entry-primary">
            <button
              class="photo-open project-photo"
              type="button"
              data-slide="0"
              aria-label="Open photograph from Sofia, Bulgaria"
            >
              <img
                src="./assets/photos/banihtse-29-web.jpg"
                alt=""
              />
            </button>
            <button class="project-label meta-open" type="button" data-slide="0">
              01 / Sofia, Bulgaria, 2019
            </button>
          </article>

          <article class="project-entry project-entry-secondary">
            <button
              class="photo-open project-photo"
              type="button"
              data-slide="1"
              aria-label="Open photograph from Corfu, Greece"
            >
              <img
                src="./assets/photos/untitled-11-web.jpg"
                alt=""
              />
            </button>
            <button class="project-label meta-open" type="button" data-slide="1">
              02 / Corfu, Greece, 2018
            </button>
          </article>
        </section>

        <footer class="site-footer home-footer">
          © <span id="year"></span> Stavros Vailakis
        </footer>
      </main>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Expanded photograph">
      <button class="lightbox-close" type="button" aria-label="Close photograph">×</button>
      <button class="lightbox-nav lightbox-prev" type="button" aria-label="Previous photograph">prev</button>
      <button class="lightbox-nav lightbox-next" type="button" aria-label="Next photograph">next</button>
      <figure class="lightbox-frame">
        <img src="" alt="" />
        <figcaption></figcaption>
      </figure>
    </div>

    <div class="welcome-overlay" id="welcomeOverlay" aria-hidden="true">
      <p>welcome</p>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
